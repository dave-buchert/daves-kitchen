<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hat brim -->
  <rect x="6" y="22" width="20" height="4" rx="1" fill="#444441"/>
  <!-- Hat body -->
  <ellipse cx="16" cy="14" rx="10" ry="9" fill="white" stroke="#444441" stroke-width="1.5"/>
  <!-- Puff top left -->
  <circle cx="9" cy="10" r="5" fill="white" stroke="#444441" stroke-width="1.5"/>
  <!-- Puff top right -->
  <circle cx="23" cy="10" r="5" fill="white" stroke="#444441" stroke-width="1.5"/>
  <!-- Puff top center -->
  <circle cx="16" cy="7" r="6" fill="white" stroke="#444441" stroke-width="1.5"/>
  <!-- Cover seams -->
  <rect x="7" y="14" width="18" height="8" fill="white"/>
  <!-- Brim line -->
  <rect x="6" y="21" width="20" height="2" rx="0.5" fill="#444441"/>
